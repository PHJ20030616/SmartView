openapi: 3.0.3
info:
  title: SmartView Web API
  description: SmartView Spring Boot 后端对外暴露的 Web API 契约
  version: 1.0.0
  contact:
    name: SmartView Team
servers:
  - url: http://localhost:8080
    description: 本地开发环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户信息管理
  - name: 简历
    description: 简历文件和画像管理
  - name: 面试
    description: 面试会话和问答
  - name: 报告
    description: 面试报告查询

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      tags:
        - 健康检查
      summary: 服务健康状态检查
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: 服务健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/users/me:
    get:
      tags:
        - 用户
      summary: 获取当前用户信息
      operationId: getCurrentUser
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/resumes:
    post:
      tags:
        - 简历
      summary: 上传简历文件
      operationId: uploadResume
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF 格式简历文件
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/resumes/{resumeFileId}:
    get:
      tags:
        - 简历
      summary: 获取简历文件信息
      operationId: getResumeFile
      parameters:
        - name: resumeFileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeFileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/resume-profiles/{profileId}:
    get:
      tags:
        - 简历
      summary: 获取简历画像
      operationId: getResumeProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - 简历
      summary: 更新简历画像
      operationId: updateResumeProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResumeProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/resume-profiles/{profileId}/confirm:
    post:
      tags:
        - 简历
      summary: 确认简历画像
      operationId: confirmResumeProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/interview-sessions:
    post:
      tags:
        - 面试
      summary: 创建面试会话
      operationId: createInterviewSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterviewSessionRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewSessionResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/interview-sessions/{sessionId}:
    get:
      tags:
        - 面试
      summary: 获取面试会话详情
      operationId: getInterviewSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/interview-sessions/{sessionId}/answers:
    post:
      tags:
        - 面试
      summary: 提交回答
      operationId: submitAnswer
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswerResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/interview-sessions/{sessionId}/report:
    get:
      tags:
        - 报告
      summary: 获取面试报告
      operationId: getSessionReport
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewReportResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/reports/{reportId}:
    get:
      tags:
        - 报告
      summary: 获取报告详情
      operationId: getReport
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewReportResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证，格式为 Bearer <token>

  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - message
        - data
        - traceId
        - timestamp
      properties:
        code:
          type: string
          description: 业务响应码
          example: "SUCCESS"
        message:
          type: string
          description: 响应消息
          example: "操作成功"
        data:
          type: object
          nullable: true
          description: 响应数据
        traceId:
          type: string
          format: uuid
          description: 链路追踪 ID
        timestamp:
          type: string
          format: date-time
          description: 响应时间

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - data
        - traceId
        - timestamp
      properties:
        code:
          type: string
          description: 错误码
        message:
          type: string
          description: 错误消息
        data:
          type: object
          nullable: true
          description: 错误响应数据，默认为空
        traceId:
          type: string
          format: uuid
          description: 链路追踪 ID
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
        details:
          type: object
          description: 错误详细信息

    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthData'

    HealthData:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          description: 服务健康状态
        service:
          type: string
          description: 服务名称
        timestamp:
          type: string
          format: date-time
          description: 健康检查时间

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - nickname
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          description: 登录用户名
        password:
          type: string
          minLength: 6
          maxLength: 72
          writeOnly: true
          description: 登录密码，UTF-8 编码后不得超过 BCrypt 的 72 字节限制
        nickname:
          type: string
          minLength: 1
          maxLength: 64
          description: 用户昵称
        email:
          type: string
          format: email
          maxLength: 100
          description: 邮箱（可选）
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号（可选）

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          description: 登录用户名
        password:
          type: string
          minLength: 6
          maxLength: 72
          writeOnly: true
          description: 登录密码，UTF-8 编码后不得超过 BCrypt 的 72 字节限制

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginData'

    LoginData:
      type: object
      required:
        - token
        - tokenType
        - expiresIn
        - user
      properties:
        token:
          type: string
          description: JWT 访问令牌
        tokenType:
          type: string
          enum: [Bearer]
          description: 令牌类型
        expiresIn:
          type: integer
          format: int64
          minimum: 1
          description: 访问令牌剩余有效期（秒）
        user:
          $ref: '#/components/schemas/UserInfo'

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      required:
        - id
        - username
        - nickname
        - status
      properties:
        id:
          type: string
          description: 用户 ID
        username:
          type: string
          description: 登录用户名
        nickname:
          type: string
          description: 用户昵称
        email:
          type: string
          description: 邮箱
        phone:
          type: string
          description: 手机号
        status:
          type: string
          enum: [ACTIVE, DISABLED, LOCKED]
          description: 用户状态
        lastLoginAt:
          type: string
          format: date-time
          description: 最近登录时间
        createdAt:
          type: string
          format: date-time
          description: 创建时间

    ResumeFileResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ResumeFile'

    ResumeFile:
      type: object
      required:
        - id
        - userId
        - originalFilename
        - parseStatus
      properties:
        id:
          type: string
          description: 简历文件 ID
        userId:
          type: string
          description: 所属用户 ID
        originalFilename:
          type: string
          description: 原始文件名
        fileSize:
          type: integer
          format: int64
          description: 文件大小（字节）
        mimeType:
          type: string
          description: 文件 MIME 类型
        parseStatus:
          type: string
          enum: [PENDING, PROCESSING, SUCCESS, FAILED]
          description: 解析状态
        parseTaskId:
          type: string
          description: 解析任务 ID
        errorMessage:
          type: string
          description: 解析失败原因
        uploadedAt:
          type: string
          format: date-time
          description: 上传时间
        createdAt:
          type: string
          format: date-time
          description: 创建时间

    ResumeProfileResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ResumeProfile'

    ResumeProfile:
      type: object
      required:
        - id
        - userId
        - resumeFileId
        - confirmStatus
      properties:
        id:
          type: string
          description: 简历画像 ID
        userId:
          type: string
          description: 所属用户 ID
        resumeFileId:
          type: string
          description: 对应简历文件 ID
        candidateName:
          type: string
          description: 候选人姓名
        contactInfo:
          type: object
          description: 联系方式
        education:
          type: array
          items:
            type: object
          description: 教育经历
        workExperience:
          type: array
          items:
            type: object
          description: 工作经历
        projectExperience:
          type: array
          items:
            type: object
          description: 项目经历
        skills:
          type: array
          items:
            type: string
          description: 技能列表
        rawText:
          type: string
          description: 简历原文
        confirmStatus:
          type: string
          enum: [UNCONFIRMED, CONFIRMED]
          description: 确认状态
        confirmedAt:
          type: string
          format: date-time
          description: 确认时间
        version:
          type: integer
          description: 画像版本号
        createdAt:
          type: string
          format: date-time
          description: 创建时间

    UpdateResumeProfileRequest:
      type: object
      properties:
        candidateName:
          type: string
          description: 候选人姓名
        contactInfo:
          type: object
          description: 联系方式
        skills:
          type: array
          items:
            type: string
          description: 技能列表

    CreateInterviewSessionRequest:
      type: object
      required:
        - resumeProfileId
        - roleDirection
      properties:
        resumeProfileId:
          type: string
          description: 简历画像 ID
        roleDirection:
          type: string
          enum: [JAVA_BACKEND, AGENT_DEVELOPMENT]
          description: 面试方向

    InterviewSessionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/InterviewSession'

    InterviewSession:
      type: object
      required:
        - id
        - userId
        - resumeProfileId
        - roleDirection
        - status
      properties:
        id:
          type: string
          description: 面试会话 ID
        userId:
          type: string
          description: 所属用户 ID
        resumeProfileId:
          type: string
          description: 简历画像 ID
        profileAnalysisId:
          type: string
          description: 画像分析 ID
        roleDirection:
          type: string
          enum: [JAVA_BACKEND, AGENT_DEVELOPMENT]
          description: 面试方向
        status:
          type: string
          enum: [CREATED, IN_PROGRESS, REPORTING, COMPLETED, CANCELLED, FAILED]
          description: 会话状态
        currentQuestion:
          $ref: '#/components/schemas/InterviewQuestion'
        questionCount:
          type: integer
          description: 已提出问题数量
        expectedMinQuestions:
          type: integer
          description: 预期最少问题数
        expectedMaxQuestions:
          type: integer
          description: 预期最多问题数
        startedAt:
          type: string
          format: date-time
          description: 开始时间
        endedAt:
          type: string
          format: date-time
          description: 结束时间
        createdAt:
          type: string
          format: date-time
          description: 创建时间

    InterviewQuestion:
      type: object
      required:
        - id
        - sessionId
        - questionOrder
        - questionText
      properties:
        id:
          type: string
          description: 问题 ID
        sessionId:
          type: string
          description: 所属会话 ID
        questionOrder:
          type: integer
          description: 问题序号
        parentQuestionId:
          type: string
          description: 父问题 ID（追问）
        questionText:
          type: string
          description: 问题正文
        questionType:
          type: string
          enum: [OPENING, FOLLOW_UP, SWITCH_TOPIC, STAGE_ENTRY]
          description: 问题类型
        topic:
          type: string
          description: 问题主题
        sourceType:
          type: string
          enum: [KNOWLEDGE_BASE, EXPERIENCE_CASE, RESUME_PROJECT, MIXED]
          description: 来源类型
        status:
          type: string
          enum: [ASKED, ANSWERED, SKIPPED]
          description: 问题状态
        askedAt:
          type: string
          format: date-time
          description: 提问时间

    SubmitAnswerRequest:
      type: object
      required:
        - questionId
        - answerText
        - requestId
      properties:
        questionId:
          type: string
          description: 问题 ID
        answerText:
          type: string
          description: 回答文本
        requestId:
          type: string
          format: uuid
          description: 幂等请求 ID
        durationSeconds:
          type: integer
          description: 作答耗时（秒）

    SubmitAnswerResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - answerId
                - evaluation
              properties:
                answerId:
                  type: string
                  description: 回答 ID
                evaluation:
                  $ref: '#/components/schemas/AnswerEvaluation'
                nextQuestion:
                  $ref: '#/components/schemas/InterviewQuestion'
                sessionStatus:
                  type: string
                  enum: [IN_PROGRESS, REPORTING, COMPLETED]
                  description: 会话状态

    AnswerEvaluation:
      type: object
      required:
        - score
        - level
      properties:
        id:
          type: string
          description: 评估 ID
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: 得分
        level:
          type: string
          enum: [GOOD, NORMAL, WEAK]
          description: 等级
        evaluationText:
          type: string
          description: 评估说明

    InterviewReportResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/InterviewReport'

    InterviewReport:
      type: object
      required:
        - id
        - sessionId
        - userId
        - status
      properties:
        id:
          type: string
          description: 报告 ID
        sessionId:
          type: string
          description: 面试会话 ID
        userId:
          type: string
          description: 所属用户 ID
        resumeProfileId:
          type: string
          description: 简历画像 ID
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
          description: 综合得分
        readinessLevel:
          type: string
          enum: [NOT_READY, NEEDS_PRACTICE, READY, WELL_PREPARED]
          description: 面试准备度
        roleFitScore:
          type: integer
          minimum: 0
          maximum: 100
          description: 岗位匹配度
        summary:
          type: string
          description: 总体评价
        strengths:
          type: array
          items:
            type: string
          description: 优势点
        weaknesses:
          type: array
          items:
            type: string
          description: 薄弱点
        riskPoints:
          type: array
          items:
            type: string
          description: 风险点
        suggestions:
          type: array
          items:
            type: string
          description: 学习建议
        coverage:
          type: object
          description: 覆盖情况
        referenceAnswers:
          type: array
          items:
            $ref: '#/components/schemas/ReferenceAnswer'
          description: 参考答案列表
        status:
          type: string
          enum: [GENERATING, SUCCESS, FAILED]
          description: 报告状态
        generatedAt:
          type: string
          format: date-time
          description: 生成时间

    ReferenceAnswer:
      type: object
      required:
        - questionId
        - answerType
        - referenceContent
      properties:
        id:
          type: string
          description: 参考答案 ID
        questionId:
          type: string
          description: 对应问题 ID
        answerType:
          type: string
          enum: [BASIC_KEY_POINTS, PROJECT_STRUCTURE, SCENARIO_FRAMEWORK]
          description: 答案类型
        referenceContent:
          type: string
          description: 参考答案正文
        keyPoints:
          type: array
          items:
            type: string
          description: 关键要点

  responses:
    BadRequest:
      description: 请求参数格式错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: 未登录或 Token 失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: 无权限访问资源
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: 资源状态冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
