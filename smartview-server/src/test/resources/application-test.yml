spring:
  datasource:
    driver-class-name: org.h2.Driver
    # 使用 MySQL 兼容模式运行生产 Flyway 脚本，避免测试表结构与真实环境产生偏差。
    url: jdbc:h2:mem:smartview_test;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

smartview:
  jwt:
    # 测试密钥独立于开发默认值，长度满足 HMAC-SHA 签名安全要求。
    secret: smartview-test-jwt-secret-at-least-32-bytes-long
    issuer: smartview-test
    access-token-ttl-seconds: 3600
