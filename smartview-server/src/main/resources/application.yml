server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smartview-server
  mvc:
    throw-exception-if-no-handler-found: true
    static-path-pattern: /static/**
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_JDBC_URL:jdbc:mysql://localhost:3306/smartview?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD:123456}
  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    # 如果数据库非空且没有 flyway_schema_history 表，则自动创建基线版本
    baseline-on-migrate: true
    # 迁移脚本存放位置
    locations: classpath:db/migration
    # 基线版本号，用于已有数据库的初始化
    baseline-version: 0
    # 迁移脚本文件编码
    encoding: UTF-8
    # 校验已应用的迁移脚本是否被修改（生产环境建议开启）
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:smartview_redis_password}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:smartview}
    password: ${RABBITMQ_DEFAULT_PASS:123456}
    virtual-host: ${RABBITMQ_DEFAULT_VHOST:smartview}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  # 全局逻辑删除配置
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑未删除值（默认值）
      logic-not-delete-value: 0
      # 逻辑已删除值
      logic-delete-value: 1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

smartview:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:smartview}
    secret-key: ${MINIO_ROOT_PASSWORD:smartview_minio_password}
    bucket: ${MINIO_BUCKET:smartview}
  jwt:
    # 签名密钥禁止提供可预测回退值；未配置或强度不足时应用必须在启动阶段失败。
    secret: ${JWT_SECRET:1234567890123456789012345678901234567890}
    issuer: ${JWT_ISSUER:smartview}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:7200}
  resume:
    # 简历文件上传配置
    max-file-size: ${RESUME_MAX_FILE_SIZE:10485760}  # 10MB
    allowed-mime-types: ${RESUME_ALLOWED_MIME_TYPES:application/pdf}
    mq:
      # MQ 投递配置
      max-retry-attempts: ${RESUME_MQ_MAX_RETRY_ATTEMPTS:3}
      retry-base-delay-ms: ${RESUME_MQ_RETRY_BASE_DELAY_MS:100}
      scheduled-retry-interval-minutes: ${RESUME_MQ_SCHEDULED_RETRY_INTERVAL_MINUTES:5}
      max-scheduled-retry-count: ${RESUME_MQ_MAX_SCHEDULED_RETRY_COUNT:3}
